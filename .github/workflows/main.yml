name: Generate Sheet Music

on:
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies (Kotlin, MuseScore)
        run: |
          sudo snap install --classic kotlin
          sudo apt-get update
          sudo apt-get install -y musescore xvfb

      - name: Setup Python & AI Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        # We just added 'torchcodec' to the very end
      - run: pip install "numpy<2" basic-pitch demucs torchcodec

      - name: Compile Kotlin Code
        run: kotlinc src/Main.kt -include-runtime -d MusicBot.jar

      - name: Run the Pipeline
        run: xvfb-run java -jar MusicBot.jar

      - name: Deliver the PDF
        uses: actions/upload-artifact@v4
        with:
          name: Violin-Sheet-Music
          path: FinalSheetMusic.pdf