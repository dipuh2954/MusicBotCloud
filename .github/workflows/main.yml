name: Generate Sheet Music

# Notice how clean this is now! Just a simple click-to-run trigger.
on:
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies (Kotlin, MuseScore)
        # We also removed ffmpeg from here since we don't need to process video anymore!
        run: |
          sudo snap install --classic kotlin
          sudo apt-get update
          sudo apt-get install -y musescore xvfb

      - name: Setup Python & AI Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install basic-pitch

      - name: Compile Kotlin Code
        run: kotlinc src/Main.kt -include-runtime -d MusicBot.jar

      - name: Run the Pipeline
        # Notice we removed the URL argument at the end of this line too
        run: xvfb-run java -jar MusicBot.jar

      - name: Deliver the PDF
        uses: actions/upload-artifact@v4
        with:
          name: Violin-Sheet-Music
          path: FinalSheetMusic.pdf