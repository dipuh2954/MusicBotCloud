name: Generate Sheet Music

# A clean, simple trigger with no required inputs
on:
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies (Kotlin, FFmpeg, MuseScore)
        # We ensure ffmpeg is here so Demucs/torchcodec can actually read the MP3
        run: |
          sudo snap install --classic kotlin
          sudo apt-get update
          sudo apt-get install -y ffmpeg musescore xvfb

      - name: Setup Python & AI Tools
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # The master AI toolset: Pinned numpy, Basic Pitch, Demucs, and the audio decoder
      - name: Install AI Libraries
        run: pip install "numpy<2" basic-pitch demucs torchcodec

      - name: Compile Kotlin Code
        run: kotlinc src/Main.kt -include-runtime -d MusicBot.jar

      - name: Run the Pipeline
        run: xvfb-run java -jar MusicBot.jar

      - name: Deliver the PDF
        uses: actions/upload-artifact@v4
        with:
          name: Violin-Sheet-Music
          path: FinalSheetMusic.pdf